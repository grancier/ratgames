<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MAZE GAME</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* The framebuffer is already upscaled on the CPU; keep the browser's own
         scaling crisp rather than blurring the pixels. */
      #screen {
        image-rendering: pixelated;
        background: #000;
      }
      #error {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: #f66;
        font: 14px/1.5 monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <canvas id="screen" width="512" height="512"></canvas>
    <pre id="error"></pre>
    <script type="module" src="./main.js"></script>
  </body>
</html>
